name: S&P 500 Pulse Monitor

on:
  schedule:
    - cron: "0 13 * * 1"   # Every Monday 8 AM US Eastern (13:00 UTC)
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

permissions:
  contents: write            # Needed to commit updated JSON + HTML back to repo
  issues: write              # Needed to post weekly summary comment

jobs:
  run-pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run S&P 500 Pulse script
        env:
          GMAIL_SENDER_EMAIL: ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python sp500_pulse.py

      - name: Commit updated data and dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sp500_pulse_data.json SP500_Pulse_Dashboard.html
          git diff --cached --quiet || git commit -m "chore: weekly S&P 500 pulse update $(date +'%Y-%m-%d')"
          git push

      - name: Post weekly summary to GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import json, os, subprocess
          from datetime import datetime, timedelta

          with open("sp500_pulse_data.json") as f:
              data = json.load(f)

          cutoff = datetime.now() - timedelta(days=7)
          recent = [
              e for e in data
              if datetime.strptime(e["date_announced"], "%Y-%m-%d %H:%M") >= cutoff
          ]
          announced = [e for e in recent if e.get("status") == "ANNOUNCED"]
          additions = [e for e in recent if e["action"] == "ADDITION" and e.get("status") == "CONFIRMED"]
          removals  = [e for e in recent if e["action"] == "REMOVAL"  and e.get("status") == "CONFIRMED"]

          dashboard_url = "https://avin-khurana.github.io/USIndexAdditionRemoval/SP500_Pulse_Dashboard.html"
          body  = f"## S&P 500 Pulse — {datetime.now().strftime('%Y-%m-%d')}\n\n"
          body += f"**[Open Dashboard]({dashboard_url})**\n\n"
          body += f"New signals this week: **{len(recent)}**\n\n"

          if announced:
              body += "### ⚡ Pre-Announcement (tradeable window)\n"
              body += "| Action | Ticker | Headline |\n|---|---|---|\n"
              for e in announced:
                  tickers = ", ".join(e["tickers"]) if e["tickers"] else "TBC"
                  icon = "🟢" if e["action"] == "ADDITION" else "🔴"
                  body += f"| {icon} {e['action']} | **{tickers}** | [{e['title'][:65]}]({e['link']}) |\n"
              body += "\n"

          if additions:
              body += "### ✅ Confirmed Additions\n"
              body += "| Ticker | Effective Date |\n|---|---|\n"
              for e in additions:
                  body += f"| **{', '.join(e['tickers'])}** | {e['effective_date']} |\n"
              body += "\n"

          if removals:
              body += "### ❌ Confirmed Removals\n"
              body += "| Ticker | Effective Date |\n|---|---|\n"
              for e in removals:
                  body += f"| **{', '.join(e['tickers'])}** | {e['effective_date']} |\n"
              body += "\n"

          if not recent:
              body += "_No S&P 500 changes detected this week._\n"

          # Write to job summary (visible on GitHub web)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(body)

          # Find or create the tracker issue, then post a comment (visible in mobile app)
          result = subprocess.run(
              ["gh", "issue", "list", "--search", "S&P 500 Weekly Summary in:title",
               "--state", "open", "--json", "number", "--jq", ".[0].number"],
              capture_output=True, text=True
          )
          issue_number = result.stdout.strip()

          if not issue_number:
              create = subprocess.run(
                  ["gh", "issue", "create",
                   "--title", "S&P 500 Weekly Summary",
                   "--body", "Pinned tracker — weekly run summaries are posted as comments below."],
                  capture_output=True, text=True, check=True
              )
              # extract number from URL e.g. https://github.com/owner/repo/issues/3
              issue_number = create.stdout.strip().split("/")[-1]

          print(f"Using issue #{issue_number}")

          with open("/tmp/comment.md", "w") as f:
              f.write(body)

          subprocess.run(
              ["gh", "issue", "comment", issue_number, "--body-file", "/tmp/comment.md"],
              check=True
          )
          print(f"Comment posted to issue #{issue_number}")
          EOF
